name: AI API Automated Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest 

    steps:
    - name: 📥 Download Code from GitHub
      uses: actions/checkout@v4

    - name: 🐍 Install Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' 

    - name: 📦 Install Libraries & Run Unit Tests
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements-dev.txt
        python -m pytest -v
    - name: 🐳 Validate Docker Compose Build
      run: docker compose build

    - name: 🚀 Boot Up Microservices (Detached Mode)
      run: docker compose up -d

    - name: ⏳ Wait for Health Checks
      run: sleep 15 # Gives FastAPI time to load PyTorch weights

    - name: 🧪 E2E Smoke Test (Backend API)
      run: curl --fail http://localhost:8000/ || exit 1

    - name: 🧪 E2E Smoke Test (Frontend UI)
      run: curl --fail http://localhost:8506/ || exit 1

    - name: 🧹 Clean Up Containers
      if: always()
      run: docker compose down