services:
  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: defect-api-service

    ports:
      - "8000:8000"

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=3)"
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

    restart: unless-stopped

  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: defect-ui-service

    ports:
      - "8506:8501"

    environment:
      API_URL: http://api:8000/predict/

    depends_on:
      api:
        condition: service_healthy

    restart: unless-stopped